server {
    listen 80;

    location /page1 {
        alias /usr/share/nginx/html/page1.html;
    }

    location /page2 {
        alias /usr/share/nginx/html/page2.html;
    }

    location / {
        return 200 "AWS ECS Fargate Static Web Application is running. Visit /page1 or /page2\n";
        add_header Content-Type text/plain;
    }
}
